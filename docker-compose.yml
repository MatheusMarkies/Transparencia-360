version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: tp360-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tp360
    ports:
      - "5433:5432"
    volumes:
      # Modificado: Salva os dados do Postgres numa pasta local no seu disco D:
      - ./db_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tp360"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: tp360-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/tp360
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password

  neo4j:
    image: neo4j:5.26.0
    container_name: tp360-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt/Driver
    environment:
      NEO4J_AUTH: neo4j/admin123
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      # Modificado: Salva os grafos, logs e plugins do Neo4j numa pasta local no seu disco D:
      - ./db_data/neo4j/data:/data
      - ./db_data/neo4j/logs:/logs
      - ./db_data/neo4j/import:/var/lib/neo4j/import
      - ./db_data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5