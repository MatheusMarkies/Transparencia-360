spring:
  application:
    name: tp360-core
  datasource:
    url: jdbc:postgresql://localhost:5432/tp360
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  neo4j:
    uri: bolt://neo4j:7687
    authentication:
      username: neo4j
      password: admin123

server:
  port: 8080
